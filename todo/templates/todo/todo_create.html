{% extends 'base.html' %}
{% load static %}
{% block title %}Create Todo{% endblock %}
{% block content %}

    {% csrf_token %}
    <label for="new_todo">Todo:</label>

    <button type="submit">Create</button>
  </form>
{% endblock %}
